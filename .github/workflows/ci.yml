name: ci

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      part:
        description: "Semver part to bump"
        type: choice
        required: true
        default: patch
        options: [major, minor, patch]
      dry-run:
        description: "Dry run — compute the next version, do not tag or publish"
        type: boolean
        required: true
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # setuptools_scm derives the version from tags
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: pytest --cov=cave_pipeline --cov-report=xml
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false  # coverage upload must never block CI

  version:
    if: github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Next version from the latest tag
        id: ver
        run: |
          latest="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
          latest="${latest#v}"
          [ -z "$latest" ] && latest="0.0.0"
          IFS=. read -r major minor patch <<< "$latest"
          case "${{ github.event.inputs.part }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          echo "version=$major.$minor.$patch" >> "$GITHUB_OUTPUT"
      - name: Summary
        run: echo "next v${{ steps.ver.outputs.version }} (dry-run=${{ github.event.inputs.dry-run }})"

  publish:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry-run == 'false'
    needs: version
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write  # push the tag
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Tag and push
        run: |
          git tag "v${{ needs.version.outputs.version }}"
          git push origin "v${{ needs.version.outputs.version }}"
      - name: Build
        run: |
          pip install build
          python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
