# frequently-edited blocks first: images, job sizing (incl. ramp); identity/infra below

images:
  pcg: caveconnectome/pychunkedgraph:latest
  l2cache: caveconnectome/pcgl2cache:latest

job:
  perm_seed: 42
  batch_size: 1000
  parallel: true  # parent-chunk builds use every core; false = sequential (debug)
  cpu: "1"
  memory: 2Gi
  compute_class: ""
  task_retries: 3  # per-task retry budget before the task is dead
  max_failed_tasks: 50  # dead tasks tolerated before the layer aborts
  ramp:
    start: 4
    factor: 2
    period: 60
    max: 1024

  # optional per-layer scaling: value(L) = min(base * factor^(L-2) + add, max); max 0 = uncapped
  # resources:
  #   cpu:
  #     base: 1      # vCPU at layer 2
  #     factor: 2
  #     max: 28
  #   memory:
  #     base: 1      # GiB at layer 2
  #     factor: 2
  #     add: 1       # headroom added every layer
  #     max: 33
  #   overrides:     # exact per-layer values when a layer breaks the curve
  #     9:
  #       cpu: 30
  #       memory: 110

  # optional per-workload deep-overrides of job (e.g. meshing sized independently)
  # workloads:
  #   meshing:
  #     batch_size: 250
  #     resources:
  #       memory:
  #         base: 2
  #         factor: 2
  #         add: 1
  #         max: 110

graph_id: my_graph
dataset: dataset.yml  # dataset yaml, relative to this file (subdirs ok, e.g. my_project/dataset.yml)
workload: ingest

region: us-east1
zone: ""

bigtable:
  project: PROJECT
  instance: INSTANCE

workload_identity:
  service_account: pipeline
  gsa_email: cave-pipeline-worker@PROJECT.iam.gserviceaccount.com

secret_files:
  google-secret.json: projectA/google-secret.json
  cave-secret.json: cave-secret-projectA.json

namespace: default
persistent_util: true

# extra env on every worker + setup pod (BIGTABLE_* is set automatically from bigtable:)
env:
  # TASK_SIZE: "1"
  # PROCESS_MULTIPLIER: "5"

# container command for workloads without a built-in entrypoint
# (l2cache pending — its pipeline entrypoint is not in PCGL2Cache yet)
# commands:
#   l2cache: ["python", "-m", "pcgl2cache.batch"]

# cost + state databases as SQLAlchemy URLs; default a local SQLite file under costs/.
# point at a server to share/persist centrally (any SQLAlchemy-supported backend)
# database:
#   cost: postgresql://user:pass@host/cave_cost
#   state: postgresql://user:pass@host/cave_state
