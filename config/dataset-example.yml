data_source:
  EDGES: gs://bucket/edges
  COMPONENTS: gs://bucket/components
  WATERSHED: gs://bucket/ws

graph_config:
  CHUNK_SIZE: [512, 512, 128]
  FANOUT: 2
  SPATIAL_BITS: 10
  LAYER_ID_BITS: 8

backend_client:
  TYPE: bigtable
  CONFIG:
    ADMIN: true
    READ_ONLY: false

mesh_config:
  dir: graphene_meshes
  dynamic_mesh_dir: "dynamic"
  mip: 0
  max_layer: 6
  max_error: 40
  # CRITICAL: chunk_size = graph_config.CHUNK_SIZE divided per axis by the mip's
  # downsample factor (resolution(mip)/resolution(0) from the watershed scales).
  # For anisotropic EM that is usually [2^mip, 2^mip, 1] — X and Y shrink, Z is
  # unchanged; at mip 0 it equals CHUNK_SIZE. Mismatched values mis-tile every mesh.
  chunk_size: [512, 512, 128]
  minishard_bits:
    2: 1
    3: 3
    4: 6
    5: 9
    6: 12
    7: 15
    8: 18
    9: 18

# raw agglomeration input; its presence enables the raw ingest path automatically
# ingest_config:
#   AGGLOMERATION: gs://bucket/agg
