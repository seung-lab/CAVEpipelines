data_source:
  EDGES: gs://bucket/edges
  COMPONENTS: gs://bucket/components
  WATERSHED: gs://bucket/ws

graph_config:
  CHUNK_SIZE: [512, 512, 128]
  FANOUT: 2
  SPATIAL_BITS: 10
  LAYER_ID_BITS: 8

backend_client:
  TYPE: bigtable
  CONFIG:
    ADMIN: true
    READ_ONLY: false

mesh_config:
  dir: graphene_meshes
  dynamic_mesh_dir: "dynamic"
  mip: 0
  max_layer: 6
  max_error: 40
  # chunk_size is derived from graph_config.CHUNK_SIZE and mip (not configured).
  minishard_bits:
    2: 1
    3: 3
    4: 6
    5: 9
    6: 12
    7: 15
    8: 18
    9: 18

# register the graph with CAVE auth (sticky_auth) so its CV is readable (optional);
# its presence posts the service->table->dataset mapping on deploy. best-effort:
# a failure is logged, not fatal — register manually if it fails.
# cave_config:
#   host: https://proofreading.example.com
#   dataset: my_dataset
#   # service: pychunkedgraph   # optional; defaults to pychunkedgraph

# l2 feature cache; its presence adds the optional l2cache stage to the build
# l2cache_config:
#   cv_path: graphene://https://server/segmentation/table/my_graph
#   table_id: l2cache_my_graph
#   # register with CAVE auth (set all three) when the graphene CV is behind auth:
#   cave_host: https://proofreading.example.com
#   cave_dataset: my_dataset
#   cave_service: pychunkedgraph

# raw agglomeration input; its presence enables the raw ingest path automatically
# ingest_config:
#   AGGLOMERATION: gs://bucket/agg
